name: Déployer le service FFE sur Phelipot

on:
  push:
    branches:
      - main
    paths:
      - "service/**"
      - ".github/workflows/deploy-phelipot-service.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-phelipot-ffe-service
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Générer la configuration privée
        env:
          FFE_DB_HOST: ${{ secrets.FFE_DB_HOST }}
          FFE_DB_PORT: ${{ secrets.FFE_DB_PORT }}
          FFE_DB_NAME: ${{ secrets.FFE_DB_NAME }}
          FFE_DB_USERNAME: ${{ secrets.FFE_DB_USERNAME }}
          FFE_DB_PASSWORD: ${{ secrets.FFE_DB_PASSWORD }}
          PBE_WORDPRESS_TO_SERVICE_SECRET: ${{ secrets.PBE_WORDPRESS_TO_SERVICE_SECRET }}
          PBE_SERVICE_TO_WORDPRESS_SECRET: ${{ secrets.PBE_SERVICE_TO_WORDPRESS_SECRET }}
        run: |
          python3 <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          values = {
              "FFE_DB_HOST": os.environ["FFE_DB_HOST"],
              "FFE_DB_PORT": os.environ["FFE_DB_PORT"],
              "FFE_DB_NAME": os.environ["FFE_DB_NAME"],
              "FFE_DB_USERNAME": os.environ["FFE_DB_USERNAME"],
              "FFE_DB_PASSWORD": os.environ["FFE_DB_PASSWORD"],
              "PBE_WORDPRESS_TO_SERVICE_SECRET": os.environ["PBE_WORDPRESS_TO_SERVICE_SECRET"],
              "PBE_SERVICE_TO_WORDPRESS_SECRET": os.environ["PBE_SERVICE_TO_WORDPRESS_SECRET"],
          }

          missing = [key for key, value in values.items() if not value]

          if missing:
              raise SystemExit(
                  "Secrets GitHub manquants : " + ", ".join(missing)
              )

          config = {
              "database": {
                  "host": values["FFE_DB_HOST"],
                  "port": int(values["FFE_DB_PORT"]),
                  "name": values["FFE_DB_NAME"],
                  "username": values["FFE_DB_USERNAME"],
                  "password": values["FFE_DB_PASSWORD"],
              },
              "security": {
                  "wordpress_to_service_secret": values["PBE_WORDPRESS_TO_SERVICE_SECRET"],
                  "service_to_wordpress_secret": values["PBE_SERVICE_TO_WORDPRESS_SECRET"],
              },
          }

          payload = json.dumps(config, ensure_ascii=False).encode("utf-8")
          encoded = base64.b64encode(payload).decode("ascii")

          php = f"""<?php

          declare(strict_types=1);

          return json_decode(
              base64_decode('{encoded}', true),
              true,
              512,
              JSON_THROW_ON_ERROR
          );
          """

          output = Path(os.environ["RUNNER_TEMP"]) / "runtime.php"
          output.write_text(php, encoding="utf-8")

          print("Configuration privée générée.")
          PY

      - name: Installer lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Déployer par SFTP sur OVH
        env:
          SFTP_HOST: ${{ secrets.OVH_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.OVH_SFTP_PORT }}
          SFTP_USER: ${{ secrets.OVH_SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.OVH_SFTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.OVH_SFTP_REMOTE_DIR }}
        run: |
          lftp <<EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 30
          set sftp:auto-confirm yes

          open -u "$SFTP_USER","$SFTP_PASSWORD" sftp://$SFTP_HOST:$SFTP_PORT

          mkdir -p "$REMOTE_DIR"
          mirror -R \
            --delete \
            --verbose \
            --exclude-glob .git* \
            service/ \
            "$REMOTE_DIR"

          put -O "$REMOTE_DIR/config" "$RUNNER_TEMP/runtime.php"

          bye
          EOF