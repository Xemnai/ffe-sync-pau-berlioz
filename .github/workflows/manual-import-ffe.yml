name: Import FFE automatique

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    # 02:00 UTC : après l'import, le plugin WordPress planifié à 06:20
    # récupère uniquement le payload depuis events.php.
    - cron: '0 2 * * *'

permissions:
  contents: read

concurrency:
  group: import-ffe-pau-berlioz
  cancel-in-progress: false

jobs:
  import:
    name: Importer les tournois FFE
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Importer les départements puis finaliser
        env:
          PBE_WORDPRESS_TO_SERVICE_SECRET: ${{ secrets.PBE_WORDPRESS_TO_SERVICE_SECRET }}
        run: |
          set -euo pipefail

          endpoint='https://phelipot.pro/echecs/ffe-sync/trigger.php'

          post_action() {
            local label="$1"
            local body="$2"
            local max_time="$3"
            local timestamp
            local nonce
            local signature
            local response_file
            local status_code
            local response

            echo "::group::${label}"

            timestamp="$(date +%s)"
            nonce="$(openssl rand -hex 16)"

            signature="$(printf '%s\n%s\n%s' "$timestamp" "$nonce" "$body" \
              | openssl dgst -sha256 -hmac "$PBE_WORDPRESS_TO_SERVICE_SECRET" -hex \
              | sed 's/^.* //')"

            response_file="$(mktemp)"

            if ! status_code="$(curl \
              --silent \
              --show-error \
              --connect-timeout 15 \
              --max-time "$max_time" \
              --request POST \
              --header 'Content-Type: application/json; charset=utf-8' \
              --header 'Accept: application/json' \
              --header "X-PBE-Timestamp: $timestamp" \
              --header "X-PBE-Nonce: $nonce" \
              --header "X-PBE-Signature: $signature" \
              --data "$body" \
              --output "$response_file" \
              --write-out '%{http_code}' \
              "$endpoint")"; then
              echo "Erreur réseau : le service n’a pas répondu pour ${label}."
              cat "$response_file" || true
              rm -f "$response_file"
              echo "::endgroup::"
              return 1
            fi

            response="$(cat "$response_file")"
            rm -f "$response_file"

            printf '%s\n' "$response"

            if [[ "$status_code" -lt 200 || "$status_code" -ge 300 ]]; then
              echo "Le service a répondu HTTP ${status_code} pour ${label}."
              echo "::endgroup::"
              return 1
            fi

            if ! printf '%s' "$response" | jq -e '.status == "ok"' >/dev/null; then
              echo "Réponse inattendue du service pour ${label}."
              echo "::endgroup::"
              return 1
            fi

            echo "::endgroup::"
          }

          # Une requête courte par département : listes + fiches FFE + base SQL.
          # En cas d'erreur, arrêt immédiat : on évite d'empiler de nouvelles
          # requêtes pendant qu'OVH pourrait encore traiter la précédente.
          departments=(64 40 33 32 65 31)

          for department in "${departments[@]}"; do
            post_action \
              "Département ${department}" \
              "{\"action\":\"import_department\",\"department\":\"${department}\"}" \
              180

            sleep 2
          done

          # Une seule opération globale, après les six imports :
          # groupes, distances et participants du club.
          post_action \
            "Finalisation globale" \
            '{"action":"finalize"}' \
            240
