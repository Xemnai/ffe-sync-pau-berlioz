name: Import FFE manuel - développement

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: import-ffe-pau-berlioz
  cancel-in-progress: false

jobs:
  import:
    name: Importer les tournois FFE
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Déclencher la synchronisation FFE
        env:
          PBE_WORDPRESS_TO_SERVICE_SECRET: ${{ secrets.PBE_WORDPRESS_TO_SERVICE_SECRET }}
        run: |
          set -euo pipefail

          body='{"departments":["64","40","33","32","65","31"]}'
          timestamp="$(date +%s)"
          nonce="$(openssl rand -hex 16)"

          signature="$(printf '%s\n%s\n%s' "$timestamp" "$nonce" "$body" \
            | openssl dgst -sha256 -hmac "$PBE_WORDPRESS_TO_SERVICE_SECRET" -hex \
            | sed 's/^.* //')"

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --max-time 360 \
            --request POST \
            --header 'Content-Type: application/json; charset=utf-8' \
            --header 'Accept: application/json' \
            --header "X-PBE-Timestamp: $timestamp" \
            --header "X-PBE-Nonce: $nonce" \
            --header "X-PBE-Signature: $signature" \
            --data "$body" \
            'https://phelipot.pro/echecs/ffe-sync/trigger.php'
